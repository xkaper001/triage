  # ──────────────────────────────────────────────────────────────────────
  # threads (archived public threads in a channel / forum posts)
  # ──────────────────────────────────────────────────────────────────────
  - name: threads
    description: Archived public threads (forum posts) in a Discord channel
    guide: |
      Use this table to list forum posts in a GUILD_FORUM (type 15) or
      GUILD_MEDIA (type 16) channel. Requires channel_id from discord.channels.
      Returns archived public threads ordered by archive_timestamp descending.
      Use the returned thread id as channel_id in discord.messages to read
      the messages within each thread/post.
      SELECT id, name, message_count, member_count, thread_metadata
      FROM discord.threads WHERE channel_id = '<forum_channel_id>' LIMIT 50.
    filters:
      - name: channel_id
        required: true
      - name: before
    request:
      method: GET
      path: /channels/{{filter.channel_id}}/threads/archived/public
      query:
        - name: before
          from: filter
          key: before
    response:
      rows_path:
        - threads
      row_strategy: direct
    pagination:
      mode: none
      page_size:
        default: 50
        max: 100
        query_param: limit
    columns:
      - name: channel_id
        type: Utf8
        nullable: false
        virtual: true
        description: Parent forum channel ID from required filter
        expr:
          kind: from_filter
          key: channel_id
      - name: id
        type: Utf8
        nullable: false
        description: Thread ID (use as channel_id in discord.messages to read posts)
        expr:
          kind: path
          path:
            - id
      - name: guild_id
        type: Utf8
        nullable: true
        description: Guild ID the thread belongs to
        expr:
          kind: path
          path:
            - guild_id
      - name: parent_id
        type: Utf8
        nullable: true
        description: Parent channel ID (the forum channel)
        expr:
          kind: path
          path:
            - parent_id
      - name: name
        type: Utf8
        nullable: true
        description: Thread (forum post) title
        expr:
          kind: path
          path:
            - name
      - name: type
        type: Int64
        nullable: false
        description: Thread type (11 public thread, 12 private thread)
        expr:
          kind: path
          path:
            - type
      - name: owner_id
        type: Utf8
        nullable: true
        description: User ID of the thread creator
        expr:
          kind: path
          path:
            - owner_id
      - name: last_message_id
        type: Utf8
        nullable: true
        description: Most recent message ID in the thread
        expr:
          kind: path
          path:
            - last_message_id
      - name: message_count
        type: Int64
        nullable: true
        description: Approximate message count in the thread (capped at 50)
        expr:
          kind: path
          path:
            - message_count
      - name: member_count
        type: Int64
        nullable: true
        description: Approximate member count in the thread (capped at 50)
        expr:
          kind: path
          path:
            - member_count
      - name: flags
        type: Int64
        nullable: true
        description: Thread flags bitfield
        expr:
          kind: path
          path:
            - flags
      - name: applied_tags
        type: Json
        nullable: true
        description: Tag IDs applied to the forum post as JSON array
        expr:
          kind: path
          path:
            - applied_tags
      - name: thread_metadata
        type: Json
        nullable: true
        description: Thread metadata as JSON (archived, archive_timestamp, auto_archive_duration, locked, create_timestamp)
        expr:
          kind: path
          path:
            - thread_metadata
      - name: before
        type: Utf8
        nullable: true
        virtual: true
        description: ISO8601 timestamp cursor for archived threads before that time
        expr:
          kind: from_filter
          key: before

  # ──────────────────────────────────────────────────────────────────────
  # active_threads (all active threads in a guild)
  # ──────────────────────────────────────────────────────────────────────
  - name: active_threads
    description: All active threads in a Discord guild, including forum posts
    guide: |
      Returns all active (non-archived) threads in the guild, ordered by id
      descending. Includes public and private threads, and forum posts.
      Requires guild_id from discord.guilds. Use the returned thread id as
      channel_id in discord.messages to read messages within each thread.
      SELECT id, name, parent_id, message_count, owner_id
      FROM discord.active_threads WHERE guild_id = '<id>'.
    filters:
      - name: guild_id
        required: true
    request:
      method: GET
      path: /guilds/{{filter.guild_id}}/threads/active
    response:
      rows_path:
        - threads
      row_strategy: direct
    columns:
      - name: guild_id
        type: Utf8
        nullable: false
        virtual: true
        description: Guild ID from required filter
        expr:
